syntax = "proto3";
package lelang.lelang.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "lelang/lelang/v1/params.proto";

option go_package = "lelang/x/lelang/types";

// GenesisState defines the lelang module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
